<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
    body {
        background-color: #343a40;
    }

    .hero {
        background-color: #f5f7fa;
        color: black;
        padding: 25px;
        border-radius: 25px;
        text-align: center;
        font-size: 24px;
        float: left;
    }

    .heading{
        font-size: 64px;
    }

    .btn-custom {
        margin: 5px;
        background-color: #343a40;
        color: #f5f7fa;
    }

    .sign-up{
        color: #f5f7fa;
        text-align: center;
        display: inline-block;
    }
    
    img{
        width: 720px;
        height: 1029px;
        float: right;
        margin-left: auto;
    }

    </style>
</head>

<!--Login Box-->
<body>
    <div class="container mt-5">
        <div class="hero">
            <h1 class="heading"><b>Welcome Back!</b></h1>
            <p>Enter your details to access your Chess Tracker account!</p>
            <form>
                <input type="text" class="form-control form-control-lg" id="username" name="Username" placeholder="Username"><br>
                <input type="password" class="form-control form-control-lg" id="password" name="Password" placeholder="Password">
                <button type="button" class="btn btn-link" style="color: black;">Forgot password</button><br>
                <button type="submit" class="btn btn-custom btn-lg">Log in</button>
            </form>
        </div>
    </div>
</body>

<body>
    <img src="Images\Login.jpg" alt="Login page splash image">
</body>
