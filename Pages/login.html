<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="assets/styles.css">
</head>

<body>
    <div class = "login-display">
        <!--Login Box-->
        <div class="container" style="align-content: center;">
            <div class="sign-up-box">
                <h1 class="heading"><b>Welcome Back!</b></h1>
                <p>Enter your details to access your Chess Tracker account!</p>
                <form>
                    <input type="text" class="form-control form-control-lg" id="username" name="Username" placeholder="Username" style="margin-bottom: 10px;">
                    <input type="password" class="form-control form-control-lg" id="password" name="Password" placeholder="Password"style="margin-top 10px;">
                    <button type="button" class="btn btn-link" style="color: black;" onclick="alert('Reset your password!')">Forgot password</button><br>
                    <button type="submit" class="btn btn-secondary btn-lg" onclick="alert('Welcome back!')">Log in</button>
                </form>
            </div>
            <p class="sign-up">Don't have an account? <a onclick="alert('Sign up here!')"><b>Sign up</b></p></a>
        </div>
    </div>
</body>
