<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='stylesheets/login-signup.css') }}">
</head>

<body>
    <div class="alt-display">

        <!-- Login box — accepts username or email combined with password -->
        <div class="container" style="align-content: center;">
            <div class="sign-up-box">
                <h1 class="heading"><b>Welcome Back!</b></h1>
                <p>Enter your details to access your Chessmate account!</p>

                <!-- Flash messages — show login errors or success notices -->
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }}" role="alert">
                                {{ message }}
                            </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <form method="POST" action="/login">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <input type="text" class="form-control form-control-lg" id="username" name="username" placeholder="Username/Email address" style="margin-bottom: 10px;">
                    <input type="password" class="form-control form-control-lg" id="password" name="password" placeholder="Password" style="margin-top: 10px;">
                    <!-- Link to three-step password reset flow -->
                    <p><a class="forgot-pass" href="/forgotpassword">Forgot password</a></p><br>
                    <button type="submit" class="btn btn-secondary btn-lg btn-block">Log in</button>
                </form>
            </div>
            <p class="sign-up">Don't have an account? <a href="/signup"><b>Sign Up</b></a></p>
        </div>

        <!-- Side image — decorative splash panel -->
        <div class="login-img">
            <img src="{{ url_for('static', filename='images/Login.jpg') }}" alt="Login page splash image">
        </div>

    </div>
</body>
