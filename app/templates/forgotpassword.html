<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <!-- Bootstrap for layout and the custom login/signup stylesheet -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='stylesheets/login-signup.css') }}">
</head>

<body>
    <div class="container">
        <div class="container" style="align-content: center; margin-top: 20px;">
            <div class="sign-up-box">
                <h1 class="heading"><b>Reset Password</b></h1>
                <p>Forgot your password? Don't worry!</p>

                <!-- Three-step password reset form — step is tracked server-side via session -->
                <form method="POST" action="/forgotpassword">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    {% if resetstep == 1 %}
                    <!-- Step 1 — enter registered email address -->
                    <input type="text" class="form-control form-control-lg" id="email" name="Email"
                           placeholder="Email address" style="margin-bottom: 10px;">
                    <button type="submit" class="btn btn-secondary btn-lg btn-block">Submit</button>

                    {% elif resetstep == 2 %}
                    <!-- Step 2 — enter the verification code sent to the email -->
                    <input type="text" class="form-control form-control-lg" id="code" name="Code"
                           placeholder="Verification Code" style="margin-bottom: 10px;">
                    <button type="submit" class="btn btn-secondary btn-lg btn-block">Verify</button>

                    {% elif resetstep == 3 %}
                    <!-- Step 3 — set and confirm the new password -->
                    <input type="password" class="form-control form-control-lg" id="password" name="Password"
                           placeholder="New Password" style="margin-bottom: 10px;">
                    <input type="password" class="form-control form-control-lg" id="confirm_password" name="Confirm_Password"
                           placeholder="Confirm New Password" style="margin-bottom: 10px;">
                    <button type="submit" class="btn btn-secondary btn-lg btn-block">Reset Password</button>
                    {% endif %}

                </form>
            </div>
        </div>
    </div>
</body>
