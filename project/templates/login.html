<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
    body {
        background-color: #343a40;
    }

    .sign-up-box {
        background-color: #f5f7fa;
        color: black;
        padding: 25px;
        border-radius: 25px;
        text-align: center;
        font-size: 20px;
        margin-left: 30px;
        margin-right: 30px;
        margin-bottom: 5px;
    }

    .heading{
        font-size: 64px;
    }

    .sign-up{
        color: #f5f7fa;
        text-align: center;
        font-size: 17px;
        
    }

    btn-secondary{
        margin: 5px;
        color: #343a40;
    }
    
    img{
        max-width: 73%;
        float: right;
        margin-left: auto;
        display: grid;
    }

    .main-display {
        display: flex;
    }

    </style>
</head>

<!--Login Box-->
<body>
    <div class = "main-display">
        <div class="container mt-5" style="align-content: center;">
            <div class="sign-up-box">
                <h1 class="heading"><b>Welcome Back!</b></h1>
                <p>Enter your details to access your Chess Tracker account!</p>
                <form>
                    <input type="text" class="form-control form-control-lg" id="username" name="Username" placeholder="Username" style="margin-bottom: 10px;">
                    <input type="password" class="form-control form-control-lg" id="password" name="Password" placeholder="Password"style="margin-top 10px;">
                    <button type="button" class="btn btn-link" style="color: black;" onclick="alert('Reset your password!')">Forgot password</button><br>
                    <button type="submit" class="btn btn-secondary btn-lg" onclick="alert('Welcome back!')">Log in</button>
                </form>
            </div>
            <p class="sign-up">Don't have an account? <a href="/signup"><b>Sign up</b></p></a>
        </div>
        <!--Side image-->
        <div>
            <img src="/static/images/Login.jpg" alt="Login page splash image">
        </div>
    </div>
</body>
