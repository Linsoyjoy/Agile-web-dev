<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='stylesheets/login-signup.css') }}">
</head>

<body>
    <div class = "alt-display">
        <!--Login Box-->
        <div class="container" style="align-content: center;">
            <div class="sign-up-box">
                <h1 class="heading"><b>Welcome Back!</b></h1>
                <p>Enter your details to access your Chessmate account!</p>
                <form method="POST" action="/login">
                    <input type="text" class="form-control form-control-lg" id="username" name="Username" placeholder="Username" style="margin-bottom: 10px;">
                    <input type="password" class="form-control form-control-lg" id="password" name="Password" placeholder="Password"style="margin-top 10px;">
                    <a href="/forgotpassword" class="btn btn-link" style="color: black;">Forgot password</a><br>
                    <button type="submit" class="btn btn-secondary btn-lg btn-block">Log in</button>
                </form>
            </div>
            <p class="sign-up">Don't have an account? <a href="/signup"><b>Sign up</b></a></p>
        </div>
        <!--Side image-->
        <div class="login-img">
            <img src="{{ url_for('static', filename='images/Login.jpg') }}" alt="Login page splash image">
        </div>
    </div>
</body>
