<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='stylesheets/login-signup.css') }}">
</head>

<div class="container" style="align-content: center;">
            <div class="sign-up-box">
                <h1 class="heading"><b>Reset password</b></h1>
                <form method="POST" action="/forgotpassword">
                    <input type="text" class="form-control form-control-lg" id="email" name="Email" placeholder="Email address" style="margin-bottom: 10px;">
                    <button type="submit" class="btn btn-secondary btn-lg btn-block">Reset password</button>
                </form>
            </div>
        </div>
    </div>
</body>
