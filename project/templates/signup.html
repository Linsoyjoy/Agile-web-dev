<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
    body {
        background-color: #343a40;
    }

    .sign-up-box {
        background-color: #f5f7fa;
        color: black;
        padding: 25px;
        border-radius: 25px;
        text-align: center;
        font-size: 20px;
        margin-left: 30px;
        margin-right: 30px;
        margin-bottom: 5px;
    }

    .heading{
        font-size: 64px;
    }

    .sign-up{
        color: #f5f7fa;
        text-align: center;
        font-size: 17px;
        
    }

    btn-secondary{
        margin: 5px;
        color: #343a40;
    }
    
    img{
        max-width: 73%;
        float: right;
        margin-left: auto;
        display: grid;
    }

    .main-display {
        display: flex;
    }

    </style>
</head>

<body>
    <div class = "main-display">
        <div class="container mt-5" style="align-content: center;">
            <div class="sign-up-box">
                <h1 class="heading"><b>Join Chess Tracker!</b></h1>
                <p>Create your account to start tracking your chess journey!</p>
                
                <!-- Flash messages -->
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }}" role="alert">
                                {{ message }}
                            </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}
                
                <form method="POST" action="/signup">
                    <input type="text" class="form-control form-control-lg" id="username" name="username" placeholder="Username" style="margin-bottom: 10px;" required>
                    <input type="email" class="form-control form-control-lg" id="email" name="email" placeholder="Email" style="margin-bottom: 10px;" required>
                    <input type="password" class="form-control form-control-lg" id="password" name="password" placeholder="Password" style="margin-bottom: 10px;" required>
                    <input type="password" class="form-control form-control-lg" id="confirm_password" name="confirm_password" placeholder="Confirm Password" style="margin-bottom: 10px;" required>
                    <button type="submit" class="btn btn-secondary btn-lg">Sign Up</button>
                </form>
            </div>
            <p class="sign-up">Already have an account? <a href="/login"><b>Log in</b></p></a>
        </div>
        <div>
            <img src="/static/images/Login.jpg" alt="Sign up page splash image">
        </div>
    </div>
</body>
</html>
