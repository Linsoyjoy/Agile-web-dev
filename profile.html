<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Page</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f5f7fa;
    }

    .profile-header {
      background-color: #343a40;
      color: white;
      padding: 30px;
      border-radius: 10px;
    }

    .stat-card {
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .btn-custom {
      margin-right: 10px;
    }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Tournament</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link active" href="#">Profile</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-5">
    <div class="profile-header d-flex align-items-center">
      <div>
        <h2>John Doe</h2>
        <p>Ranking: <strong>#3</strong></p>
        <button class="btn btn-primary btn-custom">Add Friend</button>
        <button class="btn btn-success btn-custom">Share Profile</button>
      </div>
    </div>

      <div class="col-md-6">
        <div class="card p-3">
          <h5>Recent Matches</h5>
          <ul class="list-group">
            <li class="list-group-item">Win vs Alice</li>
            <li class="list-group-item">Loss vs Bob</li>
            <li class="list-group-item">Win vs Charlie</li>
          </ul>
        </div>
      </div>
    </div>

    <div class="mt-4" style="padding-left: 160px;">
      <button class="btn btn-warning">View Full Stats</button>
      <button class="btn btn-secondary">Find Similar Opponents</button>
      <button class="btn btn-danger">Report Issue</button>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
